<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Portal — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0c0e;
      --surface:   #13151a;
      --border:    #252830;
      --gold:      #c9a84c;
      --gold-dim:  #8a6f30;
      --text:      #e8e4dc;
      --muted:     #6b6860;
      --error:     #c0544a;
      --success:   #4a9c6e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    .bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 20% 30%, rgba(201,168,76,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 70%, rgba(201,168,76,.04) 0%, transparent 55%),
        var(--bg);
    }
    .bg-canvas::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
    }

    .card {
      position: relative; z-index: 1;
      width: min(420px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 52px 48px 48px;
      box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(201,168,76,.06);
      margin: auto;
      top: 50%; transform: translateY(-50%);
      animation: fadeUp .7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(calc(-50% + 24px)); }
      to   { opacity:1; transform:translateY(-50%); }
    }

    .logomark {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 40px;
    }
    .logomark svg { flex-shrink: 0; }
    .logomark-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; font-weight: 300;
      letter-spacing: .18em; color: var(--text); text-transform: uppercase;
    }
    .logomark-text span { color: var(--gold); }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px; font-weight: 300;
      letter-spacing: .02em; line-height: 1.1; margin-bottom: 6px;
    }
    .subtitle {
      font-size: 11px; letter-spacing: .12em;
      color: var(--muted); text-transform: uppercase; margin-bottom: 36px;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      margin-bottom: 36px; opacity: .5;
    }

    label {
      display: block; font-size: 10px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }
    .input-wrap { position: relative; margin-bottom: 28px; }

    input[type="password"], input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border); border-radius: 2px;
      color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 14px; letter-spacing: .1em;
      padding: 14px 46px 14px 16px; outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(201,168,76,.08);
    }

    .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 4px; display: flex; align-items: center; transition: color .2s;
    }
    .eye-btn:hover { color: var(--gold); }

    button.submit {
      width: 100%;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      border: none; border-radius: 2px; color: #0b0c0e;
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 400;
      letter-spacing: .2em; text-transform: uppercase; padding: 16px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: opacity .2s, transform .15s;
    }
    button.submit:disabled { opacity: .4; cursor: not-allowed; }
    button.submit:not(:disabled):hover  { opacity: .9; }
    button.submit:not(:disabled):active { transform: scale(.98); }
    button.submit::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.18));
    }

    .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,.2); border-top-color: #0b0c0e;
      border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    button.submit.loading .btn-label { display: none; }
    button.submit.loading .spinner  { display: block; }

    .msg {
      font-size: 11px; letter-spacing: .06em;
      padding: 12px 14px; border-radius: 2px; margin-top: 18px; display: none;
    }
    .msg.error   { background:rgba(192,84,74,.12);  border:1px solid rgba(192,84,74,.3);  color:#e07070; display:block; }
    .msg.success { background:rgba(74,156,110,.12); border:1px solid rgba(74,156,110,.3); color:#6ecf9a; display:block; }
    .msg.info    { background:rgba(201,168,76,.08); border:1px solid rgba(201,168,76,.2); color:var(--gold); display:block; }

    .footer {
      margin-top: 36px; font-size: 10px; letter-spacing: .1em;
      color: var(--muted); text-align: center; text-transform: uppercase;
    }

    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)} 40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
    }
    .shake { animation: shake .4s ease both; }
  </style>
</head>
<body>

<div class="bg-canvas"></div>

<div class="card">

  <div class="logomark">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect x="1" y="1" width="26" height="26" rx="1" stroke="#c9a84c" stroke-width="1"/>
      <path d="M8 14 L14 8 L20 14 L14 20 Z" fill="none" stroke="#c9a84c" stroke-width="1.2"/>
      <circle cx="14" cy="14" r="2.5" fill="#c9a84c"/>
    </svg>
    <div class="logomark-text">Client <span>Portal</span></div>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Enter your access key to continue</p>
  <div class="divider"></div>

  <label for="pwd">Access Key</label>
  <div class="input-wrap">
    <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password" />
    <button class="eye-btn" id="toggleEye" aria-label="Toggle visibility" type="button">
      <svg id="eyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
      <svg id="eyeOff" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
        <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    </button>
  </div>

  <button class="submit" id="submitBtn" type="button" disabled>
    <span class="btn-label">Access Dashboard →</span>
    <div class="spinner"></div>
  </button>

  <div class="msg" id="msg"></div>

  <div class="footer">Secure client access · All sessions monitored</div>
</div>

<script>
  let clientsData = [];

  const pwdInput  = document.getElementById('pwd');
  const submitBtn = document.getElementById('submitBtn');
  const msgEl     = document.getElementById('msg');
  const toggleBtn = document.getElementById('toggleEye');
  const eyeOpen   = document.getElementById('eyeOpen');
  const eyeOff    = document.getElementById('eyeOff');

  // ── Fetch clients.json on page load ──
  async function loadClients() {
    showMsg('Loading client data…', 'info');
    try {
      const res = await fetch('clients.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      clientsData = await res.json();
      msgEl.className = 'msg'; // clear info msg
      submitBtn.disabled = false;
    } catch (err) {
      showMsg('⚠ Could not load clients.json — make sure it is in the same folder as index.html.', 'error');
    }
  }

  // ── Toggle password visibility ──
  toggleBtn.addEventListener('click', () => {
    const isPass = pwdInput.type === 'password';
    pwdInput.type = isPass ? 'text' : 'password';
    eyeOpen.style.display = isPass ? 'none' : '';
    eyeOff.style.display  = isPass ? ''     : 'none';
  });

  // ── Enter key support ──
  pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  submitBtn.addEventListener('click', handleLogin);

  // ── Login handler ──
  function handleLogin() {
    const entered = pwdInput.value.trim();
    clearMsg();

    if (!entered) {
      showMsg('Please enter your access key.', 'error');
      return;
    }

    // Find matching client from JSON data
    const match = clientsData.find(c => c.password === entered);

    if (!match) {
      pwdInput.classList.add('shake');
      pwdInput.addEventListener('animationend', () => pwdInput.classList.remove('shake'), { once: true });
      showMsg('Invalid access key. Please try again.', 'error');
      return;
    }

    // Success — show welcome message and redirect to their URL
    submitBtn.classList.add('loading');
    submitBtn.disabled = true;
    showMsg(`✓ Welcome, ${match.name}! Opening your dashboard…`, 'success');

    setTimeout(() => {
      window.location.href = match.url;
    }, 1200);
  }

  function showMsg(text, type) {
    msgEl.textContent = text;
    msgEl.className = `msg ${type}`;
  }
  function clearMsg() {
    msgEl.textContent = '';
    msgEl.className = 'msg';
  }

  // Kick off JSON load immediately
  loadClients();
</script>
</body>
</html>
