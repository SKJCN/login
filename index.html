<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Portal — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0b1f42;
      --blue:    #1a4fa0;
      --sky:     #3b82f6;
      --accent:  #f59e0b;
      --light:   #f0f5ff;
      --white:   #ffffff;
      --text:    #1e2d45;
      --muted:   #6b7a96;
      --border:  #d0dff5;
      --radius:  12px;
      --error:   #dc2626;
      --success: #16a34a;
    }

    html, body {
      height: 100%;
      background: var(--light);
      color: var(--text);
      font-family: 'Nunito Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Background ── */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 20% 30%, rgba(26,79,160,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 70%, rgba(59,130,246,.05) 0%, transparent 55%),
        var(--light);
    }
    .bg-canvas::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(26,79,160,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,79,160,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 1;
      width: min(440px, 92vw);
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0;
      box-shadow: 0 8px 40px rgba(11,31,66,.13), 0 2px 8px rgba(11,31,66,.07);
      margin: auto;
      top: 50%; transform: translateY(-50%);
      overflow: hidden;
    }

    /* ── Card Header ── */
    .card-header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
      padding: 28px 36px 24px;
      position: relative;
    }
    .card-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--sky), var(--accent));
    }

    .logomark {
      display: flex; align-items: center; gap: 12px;
    }
    .logomark svg { flex-shrink: 0; }
    .logomark-text {
      font-family: 'Nunito', sans-serif;
      font-size: 18px; font-weight: 700;
      letter-spacing: .04em; color: var(--white); text-transform: uppercase;
    }
    .logomark-text span { color: var(--accent); }

    /* ── Card Body ── */
    .card-body {
      padding: 36px 36px 32px;
    }

    h1 {
      font-family: 'Nunito', sans-serif;
      font-size: 26px; font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px; letter-spacing: .04em;
      color: var(--muted); margin-bottom: 28px;
      text-transform: uppercase; font-weight: 600;
    }
    .divider {
      height: 2px;
      background: linear-gradient(90deg, var(--sky), var(--accent));
      border-radius: 2px;
      margin-bottom: 28px; opacity: .35;
    }

    label {
      display: block; font-size: 11px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 8px; font-weight: 600;
    }
    .input-wrap { position: relative; margin-bottom: 24px; }

    input[type="password"], input[type="text"] {
      width: 100%;
      background: var(--light);
      border: 1.5px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'Nunito Sans', sans-serif;
      font-size: 15px; font-weight: 500;
      padding: 13px 46px 13px 16px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(59,130,246,.12);
      background: var(--white);
    }

    .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 4px; display: flex; align-items: center; transition: color .2s;
    }
    .eye-btn:hover { color: var(--blue); }

    button.submit {
      width: 100%;
      background: linear-gradient(135deg, var(--navy), var(--blue));
      border: none; border-radius: 8px; color: var(--white);
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; padding: 15px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 14px rgba(11,31,66,.2);
    }
    button.submit:disabled { opacity: .4; cursor: not-allowed; }
    button.submit:not(:disabled):hover  { opacity: .9; box-shadow: 0 6px 20px rgba(11,31,66,.28); }
    button.submit:not(:disabled):active { transform: scale(.98); }
    button.submit::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.1));
    }

    .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.25); border-top-color: var(--white);
      border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    button.submit.loading .btn-label { display: none; }
    button.submit.loading .spinner  { display: block; }

    .msg {
      font-size: 12px; letter-spacing: .04em;
      padding: 11px 14px; border-radius: 8px; margin-top: 16px; display: none;
      font-weight: 600;
    }
    .msg.error   { background: rgba(220,38,38,.08);  border:1.5px solid rgba(220,38,38,.25);  color: var(--error); display:block; }
    .msg.success { background: rgba(22,163,74,.08);  border:1.5px solid rgba(22,163,74,.25);  color: var(--success); display:block; }
    .msg.info    { background: rgba(59,130,246,.08); border:1.5px solid rgba(59,130,246,.2);  color: var(--blue); display:block; }

    .footer {
      margin-top: 28px; font-size: 11px; letter-spacing: .08em;
      color: var(--muted); text-align: center; text-transform: uppercase;
      font-weight: 600;
    }

    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)} 40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
    }
    .shake { animation: shake .4s ease both; }
  </style>
</head>
<body>

<div class="bg-canvas"></div>

<div class="card">

  <div class="card-header">
    <div class="logomark">
      <div class="logomark-text">Sri Kamakshi Jagan <span>Cable Network</span></div>
    </div>
  </div>

  <div class="card-body">
    <h1>Welcome</h1>
    <p class="subtitle">Enter your access key to continue</p>
    <div class="divider"></div>

    <label for="pwd">Access Key</label>
    <div class="input-wrap">
      <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password" />
      <button class="eye-btn" id="toggleEye" aria-label="Toggle visibility" type="button">
        <svg id="eyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
        <svg id="eyeOff" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>

    <button class="submit" id="submitBtn" type="button" disabled>
      <span class="btn-label">Access Profile →</span>
      <div class="spinner"></div>
    </button>

    <div class="msg" id="msg"></div>

    <div class="footer">Secure client access</div>
  </div>

</div>

<script>
  let clientsData = [];

  const pwdInput  = document.getElementById('pwd');
  const submitBtn = document.getElementById('submitBtn');
  const msgEl     = document.getElementById('msg');
  const toggleBtn = document.getElementById('toggleEye');
  const eyeOpen   = document.getElementById('eyeOpen');
  const eyeOff    = document.getElementById('eyeOff');

  // ── Fetch clients.json on page load ──
  async function loadClients() {
    showMsg('Loading client data…', 'info');
    try {
      const res = await fetch('clients.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      clientsData = await res.json();
      msgEl.className = 'msg'; // clear info msg
      submitBtn.disabled = false;
    } catch (err) {
      showMsg('⚠ Could not load clients.json — make sure it is in the same folder as index.html.', 'error');
    }
  }

  // ── Toggle password visibility ──
  toggleBtn.addEventListener('click', () => {
    const isPass = pwdInput.type === 'password';
    pwdInput.type = isPass ? 'text' : 'password';
    eyeOpen.style.display = isPass ? 'none' : '';
    eyeOff.style.display  = isPass ? ''     : 'none';
  });

  // ── Enter key support ──
  pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  submitBtn.addEventListener('click', handleLogin);

  // ── Login handler ──
  function handleLogin() {
    const entered = pwdInput.value.trim();
    clearMsg();

    if (!entered) {
      showMsg('Please enter your access key.', 'error');
      return;
    }

    const match = clientsData.find(c => c.password === entered);

    if (!match) {
      pwdInput.classList.add('shake');
      pwdInput.addEventListener('animationend', () => pwdInput.classList.remove('shake'), { once: true });
      showMsg('Invalid access key. Please try again.', 'error');
      return;
    }

    submitBtn.classList.add('loading');
    submitBtn.disabled = true;
    showMsg(`✓ Welcome, ${match.name}! Opening your dashboard…`, 'success');

    setTimeout(() => {
      window.location.href = match.url;
    }, 1200);
  }

  function showMsg(text, type) {
    msgEl.textContent = text;
    msgEl.className = `msg ${type}`;
  }
  function clearMsg() {
    msgEl.textContent = '';
    msgEl.className = 'msg';
  }

  loadClients();
</script>
</body>
</html>
